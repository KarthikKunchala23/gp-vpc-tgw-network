---
name : Terraform Plan and Apply


on:
  push:
    paths:
      - 'terraform/**'
  pull_request:
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (dev, staging, prod)"
        required: true
        default: "dev"
        type: choice
        options:
            - dev
            - staging
            - prod


jobs:
  Checkout:
    name: Checkout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
  Terraform:
    name: Terraform
    environment: ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: Checkout
    env:
      TF_WORKSPACE: ${{ github.event.inputs.environment }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt
        
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: terraform plan -out=tfplan -input=false 

      - name: Validate Commit
        id: validate
        run: python3 ../../scripts/validate_commit.py
        # Check if the commit message contains [skip plan] or [skip apply]

        
      - name: Terraform Apply
        if: steps.validate.outputs.allow_apply == 'true'
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: terraform apply -input=false -auto-approve tfplan
